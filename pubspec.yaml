name: palhetas
description: Mobile App for "Palhetas na Foz"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=2.17.6 <3.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  adaptive_theme: ^3.1.1
  webfeed: ^0.7.0
  http: ^0.13.5
  intl: ^0.17.0
  html2md: ^1.2.6
  flutter_markdown: ^0.6.10+5
  web_browser: ^0.5.0
  share_plus: ^4.0.10+1
  flutter_launcher_icons: ^0.10.0
  awesome_notifications: ^0.6.21

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0

flutter:

  uses-material-design: true

  assets:

    - "assets/"

flutter_icons:

  android: "launcher_icon"
  ios: true
  
  image_path: "assets/logo.jpg"
  min_sdk_android: 21

  web:
    generate: true
    image_path: "assets/logo.jpg"

  windows:
    generate: true
    image_path: "assets/logo.jpg"
    icon_size: 48
